name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Gradle Wrapper
        run: |
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar \
          -O gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Fix ic_window drawable
        run: |
          cat > app/src/main/res/drawable/ic_window.xml << 'XMLEOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M3,3 H21 V21 H3 Z M3,7 H21 M7,3 V7"/>
          </vector>
          XMLEOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
